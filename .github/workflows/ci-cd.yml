name: Java CI/CD with Docker Hub

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Buluttaki Linux'a Java kuruyoruz
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Projeyi paketliyoruz (jar üretiyoruz)
      - name: Build with Maven
        run: mvn clean package

      # Kasaya sakladığımız şifrelerle Docker Hub'a giriş yapıyoruz
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # İmajı basıp Docker Hub garajına fırlatıyoruz
      # NOT: "dockerhub_kullanici_adin" yazan yeri kendi kullanıcı adınla değiştir!
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: dockerhub_FurkanKurt01/ilk-spring-kutum:latest