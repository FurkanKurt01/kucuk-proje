name: Java CI/CD with Docker Hub

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      # Bu sefer yepyeni ve tertemiz isimli bir kasa anahtarı kullanıyoruz!
      - name: Login to Docker Hub
        run: echo "${{ secrets.YENI_DOCKER_SIFRE }}" | docker login -u "furkankurt01" --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t furkankurt01/ilk-spring-kutum:latest .
          docker push furkankurt01/ilk-spring-kutum:latest